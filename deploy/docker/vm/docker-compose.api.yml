services:
  api:
    build:
      context: ../../../API
    image: esportapp-api:latest
    restart: unless-stopped
    environment:
      ENV: production
      DB_HOST: ${DB_HOST:-10.0.0.10}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-esport_user}
      DB_PASS: ${DB_PASS:-esport_password}
      DB_NAME: ${DB_NAME:-esport_social}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://10.0.0.30}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
