services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-esport_social}
      MYSQL_USER: ${MYSQL_USER:-esport_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-esport_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./deploy/docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./API
    image: esportapp-api:latest
    restart: unless-stopped
    environment:
      ENV: production
      DB_HOST: ${API_DB_HOST:-db}
      DB_PORT: ${API_DB_PORT:-3306}
      DB_USER: ${API_DB_USER:-esport_user}
      DB_PASS: ${API_DB_PASS:-esport_password}
      DB_NAME: ${API_DB_NAME:-esport_social}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8081}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    image: esportapp-frontend:latest
    restart: unless-stopped
    environment:
      API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
